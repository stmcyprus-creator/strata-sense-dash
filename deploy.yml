name: Build & Deploy to Beget

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Beget via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: stmmez.beget.tech
          username: stmmez_stmaiexperts
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /stmmez/stmmez.bget.ru/public_html/
